<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { font-size: 1.2rem; margin-bottom: 1rem; }
        textarea { width: 100%; height: 100px; margin-bottom: 1rem; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #response { margin-top: 1rem; white-space: pre-wrap; font-style: italic; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Расскажите, как вы выбирали последний онлайн-курс?</h1>
        <textarea id="userInput" placeholder="Ваш ответ..."></textarea>
        <button id="sendBtn">Отправить</button>
        <div id="response"></div>
    </div>
    <script>
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const responseDiv = document.getElementById('response');

        sendBtn.onclick = async () => {
            const text = userInput.value.trim();
            if (!text) return;

            sendBtn.disabled = true;
            responseDiv.textContent = 'Думаю...';

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                responseDiv.textContent = data.reply || data.detail || 'Ошибка';
            } catch (e) {
                responseDiv.textContent = 'Ошибка сети';
            } finally {
                sendBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
